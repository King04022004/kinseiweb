<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>協賛企業 | 近世 KINSEI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Noto Sans JP', sans-serif;
        }
    </style>
</head>
<body class="min-h-screen bg-slate-950 text-white">
    <main class="max-w-5xl mx-auto px-6 py-24">
        <a href="index.html" class="inline-flex items-center gap-2 text-sky-300 hover:text-sky-200 transition">← ホームへ戻る</a>
        <section class="mt-10 rounded-[2rem] border border-white/10 bg-white/5 backdrop-blur-sm p-8 md:p-12">
            <p class="text-sm uppercase tracking-[0.3em] text-amber-300">Sponsor Page</p>
            <h1 class="mt-4 text-4xl md:text-6xl font-black leading-tight">協賛企業ページをここから拡張していきます。</h1>
            <p class="mt-6 text-lg text-slate-300 leading-relaxed">
                このページは、次にいただく追加コードの受け皿として先に用意しています。
                今は仮ページですが、`sponsor.html` への導線はすでにホームから接続済みです。
            </p>
            <div class="mt-10 grid gap-4 md:grid-cols-3">
                <div class="rounded-2xl border border-sky-400/20 bg-sky-400/10 p-5">
                    <h2 class="font-bold text-sky-200">対応済み</h2>
                    <p class="mt-2 text-sm text-slate-300">ホームからの遷移先として接続済み</p>
                </div>
                <div class="rounded-2xl border border-amber-400/20 bg-amber-400/10 p-5">
                    <h2 class="font-bold text-amber-200">次の想定</h2>
                    <p class="mt-2 text-sm text-slate-300">企業向けプラン詳細、ロゴ掲載、導入導線</p>
                </div>
                <div class="rounded-2xl border border-emerald-400/20 bg-emerald-400/10 p-5">
                    <h2 class="font-bold text-emerald-200">運用方針</h2>
                    <p class="mt-2 text-sm text-slate-300">追加HTMLを順次ここや別ページへ展開可能</p>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
